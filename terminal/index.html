<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; form-action 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Terminal — Pinnacle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
<style>
*{box-sizing:border-box;}
html,body{height:100%;margin:0;overflow:hidden;}
#app{height:100vh;display:flex;flex-direction:column;background:var(--bg);color:var(--fg);font-family:var(--font-body,'Inter',sans-serif);}

/* ── TOPBAR ── */
.t-topbar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:var(--bg-1);border-bottom:1px solid var(--line);flex-shrink:0;gap:12px;position:relative;z-index:10;}
.t-topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(30,255,110,.25),transparent);pointer-events:none;}
.t-brand{display:flex;align-items:center;gap:9px;font-family:var(--font-display,'Space Grotesk',sans-serif);font-size:15px;font-weight:700;letter-spacing:-.02em;text-decoration:none;color:var(--fg);}
.t-brand-mark{width:20px;height:20px;background:var(--accent);border-radius:4px;position:relative;flex-shrink:0;box-shadow:0 0 14px rgba(30,255,110,.35);}
.t-brand-mark::after{content:"";position:absolute;inset:3px;background:#000;clip-path:polygon(50% 0,100% 100%,0 100%);}
.t-stats{display:flex;align-items:center;gap:18px;font-family:var(--font-mono,'JetBrains Mono',monospace);font-size:11px;color:var(--fg-mute);}
.t-stat-val{color:var(--accent);font-weight:700;margin-right:3px;}
.live-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:livepulse 1.8s ease-in-out infinite;flex-shrink:0;}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 0 rgba(30,255,110,.45);}50%{box-shadow:0 0 0 5px rgba(30,255,110,0);}}
.t-topbar-right{display:flex;align-items:center;gap:6px;}
.t-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;border:1px solid var(--line-strong);background:transparent;color:var(--fg-dim);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--font-body,'Inter');}
.t-btn:hover{color:var(--fg);border-color:rgba(255,255,255,.18);background:var(--bg-2);}
.t-btn.active{color:var(--accent);border-color:rgba(30,255,110,.3);background:rgba(30,255,110,.06);}
.t-btn-primary{background:var(--accent);color:#001508;border-color:transparent;font-weight:700;box-shadow:0 2px 14px rgba(30,255,110,.25);}
.t-btn-primary:hover{background:#2dff7c;box-shadow:0 4px 22px rgba(30,255,110,.4);}
.alert-bell{position:relative;}
.badge-count{position:absolute;top:-5px;right:-5px;min-width:15px;height:15px;border-radius:999px;background:var(--rose);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 3px;font-family:var(--font-mono);pointer-events:none;box-shadow:0 0 0 2px var(--bg-1);}

/* ── LAYOUT ── */
.t-body{display:flex;flex:1;overflow:hidden;}
.t-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.t-content{flex:1;overflow-y:auto;}

/* ── SIDEBAR ── */
.t-sidebar{width:216px;flex-shrink:0;border-right:1px solid var(--line);background:var(--bg-1);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar-section{padding:18px 10px 8px;}
.sidebar-label{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.2em;color:var(--fg-mute);margin-bottom:8px;display:block;padding-left:10px;}
.sport-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--fg-dim);cursor:pointer;border:1px solid transparent;background:transparent;transition:all .12s;text-align:left;position:relative;}
.sport-btn:hover{background:var(--bg-2);color:var(--fg);}
.sport-btn.active{background:rgba(30,255,110,.07);color:var(--accent);border-color:rgba(30,255,110,.15);}
.sport-btn.active::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:2px;background:var(--accent);border-radius:1px;}
.sport-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0;line-height:1;}
.sport-count{margin-left:auto;font-family:var(--font-mono);font-size:9px;background:var(--bg-3);color:var(--fg-mute);padding:1px 6px;border-radius:99px;font-weight:600;}
.sport-btn.active .sport-count{background:rgba(30,255,110,.12);color:var(--accent);}
.sidebar-bottom{margin-top:auto;padding:10px;border-top:1px solid var(--line);}

/* ── FILTER BAR ── */
.t-filterbar{padding:9px 14px;border-bottom:1px solid var(--line);display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:var(--bg-1);flex-shrink:0;}
.t-chip{padding:4px 11px;border-radius:99px;font-size:10px;font-weight:700;border:1px solid var(--line-strong);background:transparent;color:var(--fg-dim);cursor:pointer;transition:all .12s;font-family:var(--font-mono);letter-spacing:.06em;text-transform:uppercase;}
.t-chip:hover{color:var(--fg);border-color:rgba(255,255,255,.18);background:var(--bg-2);}
.t-chip.active{background:rgba(30,255,110,.09);color:var(--accent);border-color:rgba(30,255,110,.3);}
.t-chip.rose.active{background:rgba(255,86,117,.1);color:var(--rose);border-color:rgba(255,86,117,.3);}
.t-chip.amber.active{background:rgba(245,183,59,.1);color:var(--amber);border-color:rgba(245,183,59,.3);}
.t-search{background:var(--bg-2);border:1px solid var(--line-strong);border-radius:7px;padding:5px 11px;font-size:12px;color:var(--fg);outline:none;font-family:var(--font-body,'Inter');width:172px;transition:border-color .15s;}
.t-search:focus{border-color:rgba(30,255,110,.3);box-shadow:0 0 0 3px rgba(30,255,110,.05);}
.t-search::placeholder{color:var(--fg-mute);}

/* ── SORT BAR ── */
.t-sortbar{padding:7px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:5px;background:var(--bg);flex-shrink:0;}
.sort-label{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:var(--fg-mute);margin-right:5px;}
.sort-btn{padding:4px 10px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--fg-mute);white-space:nowrap;transition:all .12s;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;}
.sort-btn:hover{color:var(--fg);border-color:var(--line-strong);}
.sort-btn.active{background:rgba(30,255,110,.09);color:var(--accent);border-color:rgba(30,255,110,.25);}

/* ── GAME LIST ── */
.game-list{padding:14px;display:flex;flex-direction:column;gap:10px;}
.empty-state{padding:80px 24px;text-align:center;color:var(--fg-mute);font-size:14px;line-height:1.6;}

/* ── GAME CARD ── */
.game-card{background:var(--bg-1);border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.game-card:hover{border-color:rgba(255,255,255,.1);box-shadow:0 4px 28px rgba(0,0,0,.3);}
.game-card.has-arb{border-color:rgba(30,255,110,.22);}
.game-card.has-steam{border-color:rgba(255,86,117,.18);}

/* Game card header */
.game-header{display:grid;grid-template-columns:1fr auto auto;align-items:center;padding:14px 16px;cursor:pointer;gap:14px;}
.game-header:hover{background:rgba(255,255,255,.018);}
.game-matchup-block{min-width:0;}
.game-matchup{font-family:var(--font-display,'Space Grotesk',sans-serif);font-size:15px;font-weight:600;letter-spacing:-.015em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.game-matchup .vs{color:var(--fg-mute);font-weight:400;margin:0 5px;}
.game-meta-row{display:flex;align-items:center;gap:7px;margin-top:5px;flex-wrap:wrap;}
.date-pill{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;padding:2px 7px;border-radius:4px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--fg-dim);}
.date-pill.today{background:rgba(30,255,110,.08);color:var(--accent);border-color:rgba(30,255,110,.22);}
.game-time-pill{font-family:var(--font-mono);font-size:10px;color:var(--fg-mute);text-transform:uppercase;letter-spacing:.06em;}
.conf-mini{display:flex;align-items:center;gap:6px;margin-top:5px;}
.conf-mini-track{width:50px;height:3px;background:var(--bg-3);border-radius:2px;overflow:hidden;}
.conf-mini-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#16c95a,var(--accent));}
.conf-mini-label{font-family:var(--font-mono);font-size:9px;color:var(--fg-mute);}

/* Mini odds in card header */
.game-header-odds{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
.gho-market-label{font-family:var(--font-mono);font-size:8px;text-transform:uppercase;letter-spacing:.14em;color:var(--fg-mute);}
.gho-cols{display:flex;align-items:stretch;gap:3px;}
.gho-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 10px;background:var(--bg-2);border:1px solid var(--line);border-radius:7px;min-width:56px;gap:2px;}
.gho-col.best{background:rgba(30,255,110,.07);border-color:rgba(30,255,110,.28);}
.gho-team{font-family:var(--font-mono);font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--fg-mute);}
.gho-line{font-family:var(--font-mono);font-size:9px;color:var(--fg-dim);}
.gho-odds{font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--fg);}
.gho-col.best .gho-odds{color:var(--accent);}

/* Card right: badges + chevron */
.game-header-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.chevron-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--fg-mute);background:var(--bg-2);border:1px solid var(--line);transition:all .18s;flex-shrink:0;}
.chevron-btn.open{color:var(--accent);background:rgba(30,255,110,.08);border-color:rgba(30,255,110,.25);transform:rotate(180deg);}

/* Badges */
.value-tag{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:5px;font-family:var(--font-mono);font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;}
.value-tag.ev{background:rgba(30,255,110,.09);color:var(--accent);border:1px solid rgba(30,255,110,.28);}
.arb-tag{background:rgba(30,255,110,.11);color:var(--accent);border:1px solid rgba(30,255,110,.32);padding:3px 7px;border-radius:5px;font-family:var(--font-mono);font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;}
.sharp-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:5px;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-family:var(--font-mono);}
.sharp-badge.steam{background:rgba(255,86,117,.09);color:var(--rose);border:1px solid rgba(255,86,117,.25);}
.sharp-badge.sharp{background:rgba(30,255,110,.09);color:var(--accent);border:1px solid rgba(30,255,110,.25);}

/* ── GAME BODY ── */
.game-body{border-top:1px solid var(--line);}
.subtabs{display:flex;background:var(--bg-2);border-bottom:1px solid var(--line);padding:0 2px;}
.subtab{padding:10px 16px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-mute);cursor:pointer;border:none;background:transparent;transition:all .12s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.subtab:hover{color:var(--fg);}
.subtab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* Arb banner */
.arb-banner{display:flex;align-items:center;gap:10px;padding:9px 16px;font-family:var(--font-mono);font-size:11px;font-weight:700;background:linear-gradient(90deg,rgba(30,255,110,.07),rgba(30,255,110,.02));border-bottom:1px solid rgba(30,255,110,.18);color:var(--accent);flex-wrap:wrap;}
.arb-pct{font-size:14px;font-weight:900;}
.arb-label-pill{background:rgba(30,255,110,.12);border:1px solid rgba(30,255,110,.3);border-radius:4px;padding:1px 7px;font-size:9px;font-weight:900;letter-spacing:.1em;}

/* Book header */
.book-header{display:grid;padding:6px 14px;font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.13em;color:var(--fg-mute);border-bottom:1px solid var(--line);background:var(--bg-2);}

/* Market section */
.market-section{border-bottom:1px solid var(--line);}
.market-section:last-child{border-bottom:0;}
.market-name{padding:8px 14px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--fg-dim);border-bottom:1px solid var(--line);background:var(--bg-2);display:flex;align-items:center;gap:8px;}
.market-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:.55;flex-shrink:0;}

/* Outcome row */
.outcome-row{display:flex;align-items:stretch;border-bottom:1px solid var(--line);min-height:58px;}
.outcome-row:last-of-type{border-bottom:0;}
.outcome-label{flex:0 0 140px;padding:11px 14px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--line);}
.outcome-name{font-size:13px;font-weight:600;color:var(--fg);}
.outcome-line{font-family:var(--font-mono);font-size:11px;color:var(--fg-dim);margin-top:2px;}
.hit-pill{font-family:var(--font-mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;border:1px solid var(--line);color:var(--fg-mute);margin-top:4px;display:inline-block;}
.hit-pill.high{color:var(--accent);border-color:rgba(30,255,110,.3);background:rgba(30,255,110,.05);}
.hit-pill.mid{color:var(--amber);border-color:rgba(245,183,59,.3);background:rgba(245,183,59,.05);}

/* Odds cells */
.odds-cells{display:flex;flex:1;}
.odds-btn{flex:1;padding:10px 5px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--line);border-top:none;border-left:none;border-bottom:none;background:transparent;cursor:pointer;transition:all .12s;gap:3px;min-width:0;position:relative;}
.odds-btn:last-child{border-right:0;}
.odds-btn:hover{background:rgba(255,255,255,.025);}
.odds-btn.is-best{background:rgba(30,255,110,.05);}
.odds-btn.is-best::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);}
.odds-btn.is-best .odds-val{color:var(--accent);}
.odds-btn.in-slip{background:rgba(30,255,110,.1);}
.odds-val{font-family:var(--font-mono);font-size:15px;font-weight:700;color:var(--fg);letter-spacing:-.01em;}
.odds-book{font-family:var(--font-mono);font-size:8px;color:var(--fg-mute);text-transform:uppercase;letter-spacing:.1em;}
.ev-badge{font-family:var(--font-mono);font-size:8px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:1px 5px;border-radius:3px;}
.ev-badge.ev-pos{color:var(--accent);background:rgba(30,255,110,.1);}
.ev-badge.ev-neu{color:var(--amber);background:rgba(245,183,59,.1);}
.ev-badge.ev-neg{color:var(--fg-mute);}

/* Consensus row */
.consensus-row{display:flex;align-items:center;gap:14px;padding:7px 14px;font-family:var(--font-mono);font-size:10px;color:var(--fg-mute);border-top:1px dashed var(--line);background:var(--bg-2);flex-wrap:wrap;}
.c-label{text-transform:uppercase;letter-spacing:.1em;}
.c-val{color:var(--fg);font-weight:600;}
.c-best{color:var(--accent);font-weight:700;}

/* Game footer */
.game-footer{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr;border-top:1px solid var(--line);}
@media(max-width:900px){.game-footer{grid-template-columns:1fr 1fr;}}
.insight-block{padding:16px;border-right:1px solid var(--line);}
.insight-block:last-child{border-right:0;}
.insight-title{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.18em;color:var(--fg-mute);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.insight-title.ai-title{color:var(--accent);}
.ai-pick{background:rgba(30,255,110,.055);border:1px solid rgba(30,255,110,.15);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--fg);margin-bottom:8px;line-height:1.5;}
.ai-pick-side{font-weight:700;color:var(--accent);}
.conf-label{font-family:var(--font-mono);font-size:10px;color:var(--fg-mute);display:flex;justify-content:space-between;margin-bottom:4px;}
.conf-track{height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden;}
.conf-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#16c95a,var(--accent));}
.h2h-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--line);}
.h2h-row:last-child{border-bottom:0;margin-bottom:0;}
.h2h-winner{color:var(--accent);font-weight:600;}
.inj-item{font-size:11px;color:var(--fg-dim);margin-bottom:3px;padding:4px 7px;background:var(--bg-2);border-radius:5px;line-height:1.4;}
.inj-item .inj-name{font-weight:600;color:var(--fg);}
.sharp-bar-row{margin-bottom:7px;}
.sharp-bar-label{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;color:var(--fg-mute);margin-bottom:3px;}
.sharp-bar-track{height:5px;background:var(--bg-3);border-radius:3px;overflow:hidden;margin-bottom:2px;}
.sharp-bar-fill{height:100%;border-radius:3px;background:var(--accent);}
.sharp-bar-fill.money{background:var(--amber);}

/* ── BET SLIP ── */
.bet-slip-panel{width:280px;flex-shrink:0;background:var(--bg-1);border-left:1px solid var(--line);display:flex;flex-direction:column;box-shadow:-6px 0 24px rgba(0,0,0,.25);}
.bet-slip-panel.collapsed{display:none;}
.slip-header{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:var(--bg-2);}
.slip-header-title{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--fg);font-weight:700;}
.slip-body{flex:1;overflow-y:auto;}
.slip-empty{padding:40px 20px;text-align:center;color:var(--fg-mute);font-size:13px;line-height:1.65;}
.slip-item{padding:12px 16px;border-bottom:1px solid var(--line);}
.slip-item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.slip-item-name{font-size:13px;font-weight:600;color:var(--fg);line-height:1.3;}
.slip-item-odds{font-family:var(--font-mono);font-size:15px;color:var(--accent);font-weight:700;flex-shrink:0;}
.slip-item-meta{font-family:var(--font-mono);font-size:9px;color:var(--fg-mute);text-transform:uppercase;letter-spacing:.08em;margin-top:3px;}
.slip-item-stake{display:flex;align-items:center;gap:8px;margin-top:9px;}
.slip-stake-input{background:var(--bg-2);border:1px solid var(--line-strong);border-radius:6px;padding:5px 10px;font-family:var(--font-mono);font-size:13px;color:var(--fg);width:80px;outline:none;transition:border-color .15s;}
.slip-stake-input:focus{border-color:rgba(30,255,110,.4);}
.slip-payout{font-family:var(--font-mono);font-size:13px;color:var(--accent);font-weight:600;}
.slip-remove{background:none;border:none;cursor:pointer;color:var(--fg-mute);font-size:18px;padding:2px 3px;line-height:1;border-radius:4px;transition:all .12s;}
.slip-remove:hover{color:var(--rose);background:rgba(255,86,117,.08);}
.slip-footer{padding:13px 16px;border-top:1px solid var(--line);background:var(--bg-2);}
.slip-total{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--fg-mute);margin-bottom:8px;}
.slip-total-val{color:var(--accent);font-weight:700;}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.76);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:22px;}
.modal-box{background:var(--bg-1);border:1px solid rgba(255,255,255,.07);border-radius:16px;width:100%;max-width:640px;max-height:84vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.6),0 0 0 1px rgba(30,255,110,.05);}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg-1);z-index:1;}
.modal-title{font-family:var(--font-display,'Space Grotesk',sans-serif);font-size:20px;font-weight:600;letter-spacing:-.01em;}
.modal-close{background:var(--bg-2);border:1px solid var(--line);color:var(--fg-mute);font-size:18px;cursor:pointer;padding:0;line-height:1;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .12s;}
.modal-close:hover{color:var(--fg);border-color:rgba(255,255,255,.2);}
.modal-body{padding:22px 24px;}

/* CLV dashboard */
.clv-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:22px;}
.clv-stat{padding:17px 16px;border-right:1px solid var(--line);}
.clv-stat:last-child{border-right:0;}
.clv-stat-val{font-family:var(--font-display,'Space Grotesk',sans-serif);font-size:26px;font-weight:600;letter-spacing:-.02em;}
.clv-stat-label{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.18em;color:var(--fg-mute);margin-top:4px;}
.clv-pos{color:var(--accent);}
.clv-neg{color:var(--rose);}
.clv-table{border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.clv-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;border-bottom:1px solid var(--line);font-size:12px;}
.clv-row:last-child{border-bottom:0;}
.clv-row>div{padding:10px 12px;border-right:1px solid var(--line);}
.clv-row>div:last-child{border-right:0;}
.clv-row.head{background:var(--bg-2);font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--fg-mute);}

/* Alert modal */
.alert-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px;}
.alert-item:last-child{border-bottom:0;}
.alert-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.alert-dot.fired{background:var(--amber);}
.alert-text{flex:1;color:var(--fg);}
.alert-form{margin-top:22px;padding-top:22px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:13px;}
.form-row{display:flex;flex-direction:column;gap:5px;}
.form-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--fg-mute);}
.form-input,.form-select{background:var(--bg-2);border:1px solid var(--line-strong);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--fg);outline:none;font-family:var(--font-body,'Inter');transition:border-color .15s;}
.form-input:focus,.form-select:focus{border-color:rgba(30,255,110,.3);}

.t-content::-webkit-scrollbar,.t-sidebar::-webkit-scrollbar,.slip-body::-webkit-scrollbar{width:3px;}

.t-content::-webkit-scrollbar-thumb,.t-sidebar::-webkit-scrollbar-thumb,.slip-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px;}

// ── SECTION 5: ANALYTICS ENGINES ──
function americanToProb(odds){const o=escNum(odds);if(o>0)return 100/(o+100);return(-o)/(-o+100);}
function noVigProbs(probs){const sum=probs.reduce((a,b)=>a+b,0);return probs.map(p=>p/sum);}

function calcMarketEV(market){
  const result={};
  if(!market?.outcomes?.length)return result;
  market.outcomes.forEach(outcome=>{
    const bestOdds=outcome.bookmakers.reduce((best,b)=>b.odds>best.odds?b:best,outcome.bookmakers[0]);
    const allProbs=market.outcomes.map(o=>{
      const bk=o.bookmakers.reduce((best,b)=>b.odds>best.odds?b:best,o.bookmakers[0]);
      return americanToProb(bk.odds);
    });
    const nvProbs=noVigProbs(allProbs);
    const outIdx=market.outcomes.indexOf(outcome);
    const noVigP=nvProbs[outIdx]??0;
    const modelP=outcome.hit?.rate??noVigP;
    const impliedP=americanToProb(bestOdds.odds);
    const ev=+((modelP/impliedP-1)*100).toFixed(1);
    result[outcome.name]={ev,edge:+(ev).toFixed(1),impliedP,noVigP,modelP,bestOdds:bestOdds.odds,bestBook:bestOdds.name};
  });
  return result;
}

function evClass(ev){if(ev>=3)return'ev-pos';if(ev>=0)return'ev-neu';return'ev-neg';}

function detectArb(market){
  if(!market?.outcomes?.length)return null;
  const best=market.outcomes.map(o=>{
    const bk=o.bookmakers.reduce((b,c)=>c.odds>b.odds?c:b,o.bookmakers[0]);
    return{outcomeName:o.name,odds:bk.odds,book:bk.name,impliedP:americanToProb(bk.odds)};
  });
  const totalP=best.reduce((s,b)=>s+b.impliedP,0);
  if(totalP>=1.0)return null;
  const arbPct=+((1-totalP)*100).toFixed(2);
  const stakes=best.map(b=>({...b,stakePct:+((b.impliedP/totalP)*100).toFixed(1)}));
  return{arbPct,guaranteedProfitPct:arbPct,stakes};
}

function gameHasArb(game){return Object.values(game.lines).flat().some(m=>detectArb(m));}
function gameHasSteam(game){const sd=MOCK_SHARP_DATA[game.id];return sd&&Object.values(sd).some(m=>Object.values(m).some(o=>o.steamMove));}
function gameMaxEV(game){
  let max=-Infinity;
  Object.values(game.lines).flat().forEach(m=>{
    const evMap=calcMarketEV(m);
    Object.values(evMap).forEach(e=>{if(e.ev>max)max=e.ev;});
  });
  return max===-Infinity?0:max;
}

function calcConsensus(outcome){
  if(!outcome?.bookmakers?.length)return null;
  const odds=outcome.bookmakers.map(b=>b.odds);
  const best=Math.max(...odds);
  const worst=Math.min(...odds);
  const avg=Math.round(odds.reduce((a,b)=>a+b,0)/odds.length);
  const bestBook=outcome.bookmakers.find(b=>b.odds===best)?.name||'';
  return{avg,best,worst,spread:best-worst,bestBook};
}

function sortGames(games){
  const sorted=[...games];
  if(appState.sortBy==='ev')sorted.sort((a,b)=>gameMaxEV(b)-gameMaxEV(a));
  else if(appState.sortBy==='arb')sorted.sort((a,b)=>(gameHasArb(b)?1:0)-(gameHasArb(a)?1:0));
  else if(appState.sortBy==='conf')sorted.sort((a,b)=>(b.confidence||0)-(a.confidence||0));
  return sorted;
}

function checkAlerts(games){
  const fired=[];
  appState.alerts.forEach(alert=>{
    if(!alert.active)return;
    games.forEach(game=>{
      if(alert.gameId&&alert.gameId!==game.id)return;
      Object.values(game.lines).flat().forEach(mkt=>{
        if(alert.type==='arb'){
          const arb=detectArb(mkt);
          if(arb)fired.push({...alert,message:`ARB ${arb.arbPct.toFixed(2)}% — ${esc(mkt.name)} — ${esc(game.home)} vs ${esc(game.away)}`});
        }else if(alert.type==='ev'){
          const evMap=calcMarketEV(mkt);
          Object.entries(evMap).forEach(([name,ev])=>{
            if(ev.ev>=(alert.threshold||3)){
              fired.push({...alert,message:`+EV ${ev.ev}% — ${esc(name)} — ${esc(mkt.name)}`});
            }
          });
        }
      });
    });
  });
  return fired;
}

const VALID_SPORTS_CLIENT=new Set(['nba','nfl','mlb','nhl','ufc','pga','f1']);
let _liveLoading=false;
let _lastLoad={};
const LIVE_CACHE_TTL=2*60*60*1000; // 2 hours

function saveLiveCache(sport,games){
  try{localStorage.setItem('pinnacle_live_'+sport,JSON.stringify({ts:Date.now(),games}));}catch{}
}
function loadLiveCache(sport){
  try{
    const raw=localStorage.getItem('pinnacle_live_'+sport);
    if(!raw)return null;
    const {ts,games}=JSON.parse(raw);
    if(Date.now()-ts>LIVE_CACHE_TTL)return null;
    return Array.isArray(games)&&games.length?games:null;
  }catch{return null;}
}

async function loadLiveGames(sport){
  if(!VALID_SPORTS_CLIENT.has(sport))return;

  // Restore from cache immediately so there's no flash of mock data
  if(!LIVE_GAMES[sport]){
    const cached=loadLiveCache(sport);
    if(cached){LIVE_GAMES[sport]=cached;renderApp();}
  }

  const now=Date.now();
  if(_lastLoad[sport]&&now-_lastLoad[sport]<10*60_000)return;
  if(_liveLoading)return;
  _liveLoading=true;
  _lastLoad[sport]=now;
  try{
    const sportMap={nba:'basketball_nba',nfl:'americanfootball_nfl',mlb:'baseball_mlb',nhl:'icehockey_nhl',ufc:'mma_mixed_martial_arts'};
    const apiKey=sportMap[sport];
    if(!apiKey)return;
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),8000);
    const res=await fetch(`/api/odds?sport=${encodeURIComponent(apiKey)}`,{signal:ctrl.signal,credentials:'same-origin'});
    clearTimeout(t);
    if(!res.ok)return;
    const data=await res.json();
    if(!Array.isArray(data?.games)||!data.games.length)return;
    const mapped=data.games.map(g=>mapApiGame(g,sport)).filter(Boolean);
    if(mapped.length){LIVE_GAMES[sport]=mapped;saveLiveCache(sport,mapped);renderApp();}
  }catch{}
  finally{_liveLoading=false;}
}

function mapApiGame(g,sport){
  if(!g?.id||!g.home_team||!g.away_team)return null;
  const MARKET_NAMES={h2h:'Moneyline',spreads:'Spread',totals:'Total'};
  const BOOK_NAMES={draftkings:'DraftKings',fanduel:'FanDuel',betmgm:'BetMGM',caesars:'Caesars',betrivers:'BetRivers',pointsbet:'PointsBet',barstool:'Barstool',betus:'BetUS',betonlineag:'BetOnline'};
  const markets={};
  (g.bookmakers||[]).forEach(bk=>{
    const bookName=BOOK_NAMES[bk.key]||bk.title||bk.key;
    (bk.markets||[]).forEach(mkt=>{
      const mktName=MARKET_NAMES[mkt.key]||mkt.key;
      if(!markets[mktName])markets[mktName]={};
      (mkt.outcomes||[]).forEach(o=>{
        if(!o?.name||o.price==null)return;
        if(!markets[mktName][o.name]){
          markets[mktName][o.name]={name:o.name,line:o.point??null,bookmakers:[],hit:{rate:null,sample:0,last5:[]}};
        }
        markets[mktName][o.name].bookmakers.push({name:bookName,odds:o.price});
      });
    });
  });
  const teamGames=Object.entries(markets).map(([name,outcomesMap])=>({
    name,outcomes:Object.values(outcomesMap),
  })).filter(m=>m.outcomes.length>0);
  if(!teamGames.length)return null;
  return{
    id:g.id,sport,
    home:g.home_team,away:g.away_team,
    time:g.commence_time?new Date(g.commence_time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'}):'TBD',
    date:g.commence_time?new Date(g.commence_time).toLocaleDateString('en-US',{weekday:'short'}).toUpperCase():'',
    aiPick:'',aiReason:'Live data — AI analysis updating.',confidence:65,
    lines:{'team-games':teamGames,'player-bets':[]},
    h2h:{record:'LIVE',ats:'—',home:g.home_team,away:g.away_team,ou:'—'},
    injuries:[],
  };
}

// Outcome row
function renderOutcomeRow(outcome,marketEV,gameId,mktName){
  const bestOdds=Math.max(...outcome.bookmakers.map(b=>b.odds));
  const hitRate=outcome.hit?.rate??0;
  const hitPct=Math.round(hitRate*100);
  const hitClass=hitPct>=60?'high':hitPct>=48?'mid':'';

  const lineStr=outcome.line!==null&&outcome.line!==undefined
    ?(outcome.line>0?`+${outcome.line}`:String(outcome.line))
    :'';

  const oddsBtns=outcome.bookmakers.map(bk=>{
    const isBest=bk.odds===bestOdds;
    const evData=marketEV[outcome.name];
    const evVal=evData?evData.ev:null;
    const evCls=evVal!==null?evClass(evVal):'ev-neg';
    const evStr=evVal!==null?(evVal>0?`+${evVal}%`:`${evVal}%`):'';
    const inSlip=appState.betSlipBets.some(b=>b.outcomeName===outcome.name&&b.bookName===bk.name&&b.gameId===gameId);
    return`<button
      class="odds-btn ${isBest?'is-best':''} ${inSlip?'in-slip':''}"
      onclick="addToBetSlip('${escAttr(gameId)}','${escAttr(outcome.name)}',${escNum(outcome.line)},'${escAttr(bk.name)}',${escNum(bk.odds)},'${escAttr(mktName)}')"
      title="${escAttr(bk.name)}: ${fmtOdds(bk.odds)}"
    >
      <span class="odds-val">${esc(fmtOdds(bk.odds))}</span>
      <span class="odds-book">${esc(bk.name.slice(0,4).toUpperCase())}</span>
      ${isBest&&evStr?`<span class="ev-badge ${evCls}">${esc(evStr)}</span>`:''}
    </button>`;
  }).join('');

  return`
<div class="outcome-row">
  <div class="outcome-label">
    <div class="outcome-name">${esc(outcome.name)}</div>
    ${lineStr?`<div class="outcome-line">${esc(lineStr)}</div>`:''}
    <span class="hit-pill ${hitClass}">${esc(String(hitPct))}% hit</span>
  </div>
  <div class="odds-cells">${oddsBtns}</div>
</div>`;
}

// CLV dashboard
function renderCLVDashboard(){
  const bets=appState.savedBets;
  const wins=bets.filter(b=>b.result==='win').length;
  const losses=bets.filter(b=>b.result==='loss').length;
  const settled=wins+losses;
  const winRate=settled>0?Math.round((wins/settled)*100):0;

  const totalStaked=bets.reduce((s,b)=>s+(b.stake||0),0);
  const totalReturns=bets.reduce((s,b)=>{
    if(b.result==='win')return s+((b.stake||0)*b.payout);
    return s;
  },0);
  const pl=totalReturns-totalStaked;
  const plFmt=(pl>=0?'+':'')+pl.toFixed(2);
  const plClass=pl>=0?'clv-pos':'clv-neg';

  const avgClv=bets.length>0
    ?(bets.reduce((s,b)=>s+(b.clv||0),0)/bets.length).toFixed(1)
    :'—';

  const tableRows=bets.length===0
    ?`<div class="clv-row"><div style="grid-column:1/-1;color:var(--fg-mute);text-align:center;padding:24px;">No tracked bets yet. Place bets via the slip to begin tracking.</div></div>`
    :bets.slice().reverse().map(b=>{
      const resColor=b.result==='win'?'var(--accent)':b.result==='loss'?'var(--rose)':'var(--fg-mute)';
      const betPl=b.result==='win'?((b.stake||0)*b.payout-(b.stake||0)).toFixed(2):b.result==='loss'?`-${(b.stake||0).toFixed(2)}`:'—';
      return`<div class="clv-row">
  <div style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(b.outcomeName)} <span style="color:var(--fg-mute);font-size:11px;">${esc(b.marketName)}</span></div>
  <div style="font-family:var(--font-mono);color:var(--accent);">${esc(fmtOdds(b.odds))}</div>
  <div style="font-family:var(--font-mono);">$${esc(String(b.stake||0))}</div>
  <div style="font-family:var(--font-mono);color:${resColor};">${esc(betPl)}</div>
  <div>
    <select
      style="background:var(--bg-2);border:1px solid var(--line-strong);border-radius:5px;padding:3px 7px;font-size:11px;color:var(--fg);font-family:var(--font-mono);outline:none;"
      onchange="updateSavedBetResult(${escNum(b.id)},this.value)"
    >
      <option value="pending" ${b.result==='pending'?'selected':''}>Pending</option>
      <option value="win" ${b.result==='win'?'selected':''}>Win</option>
      <option value="loss" ${b.result==='loss'?'selected':''}>Loss</option>
      <option value="push" ${b.result==='push'?'selected':''}>Push</option>
    </select>
  </div>
</div>`;
    }).join('');

  return`
<div class="modal-overlay" onclick="if(event.target===this)toggleCLVDashboard()">
  <div class="modal-box" style="max-width:760px;">
    <div class="modal-head">
      <span class="modal-title">CLV Tracker</span>
      <button class="modal-close" onclick="toggleCLVDashboard()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="clv-summary">
        <div class="clv-stat">
          <div class="clv-stat-val">${esc(String(bets.length))}</div>
          <div class="clv-stat-label">Total Bets</div>
        </div>
        <div class="clv-stat">
          <div class="clv-stat-val" style="color:var(--fg-dim);">${esc(String(avgClv))}${typeof avgClv==='string'&&avgClv!=='—'?'%':''}</div>
          <div class="clv-stat-label">Avg CLV</div>
        </div>
        <div class="clv-stat">
          <div class="clv-stat-val">${settled>0?`${esc(String(winRate))}%`:'—'}</div>
          <div class="clv-stat-label">Win Rate</div>
        </div>
        <div class="clv-stat">
          <div class="clv-stat-val ${plClass}">${bets.length>0?`$${esc(plFmt)}`:'—'}</div>
          <div class="clv-stat-label">P&amp;L</div>
        </div>
      </div>
      <div class="clv-table">
        <div class="clv-row head">
          <div>Bet</div><div>Odds</div><div>Stake</div><div>P&amp;L</div><div>Result</div>
        </div>
        ${tableRows}
      </div>
    </div>
  </div>
</div>`;
}

// Terminal main
function renderTerminal(){
  const sport=appState.currentSport;
  let games=gamesFor(sport);

  const q=appState.searchQuery.trim().toLowerCase();
  if(q)games=games.filter(g=>g.home.toLowerCase().includes(q)||g.away.toLowerCase().includes(q));
  if(appState.filterArbOnly)games=games.filter(g=>gameHasArb(g));
  if(appState.filterSharpOnly)games=games.filter(g=>gameHasSteam(g));
  if(appState.filterPositiveEV)games=games.filter(g=>gameMaxEV(g)>=3);
  games=sortGames(games);

  const total=games.length;
  const valueCount=gamesFor(sport).filter(g=>gameMaxEV(g)>=3).length;
  const avgConf=gamesFor(sport).length>0
    ?Math.round(gamesFor(sport).reduce((s,g)=>s+(g.confidence||0),0)/gamesFor(sport).length)
    :0;
  const alertCount=getAlertCount();

  const gameCards=games.length>0
    ?games.map(renderGameCard).join('')
    :`<div class="empty-state">No games match your filters for <strong>${esc(sport.toUpperCase())}</strong>.</div>`;

  return`
${renderTopBar(total,valueCount,avgConf,alertCount)}
<div class="t-body">
  ${renderSidebar()}
  <div class="t-main">
    ${renderFilterBar()}
    ${renderSortBar()}
    <div style="display:flex;flex:1;overflow:hidden;">
      <div class="t-content" style="flex:1;overflow-y:auto;">
        <div class="game-list">${gameCards}</div>
      </div>
      ${appState.betSlipOpen?renderBetSlipPanel():''}
    </div>
  </div>
</div>`;
}

// Main renderApp
function renderApp(){
  const app=document.getElementById('app');
  if(!app)return;

  if(appState.currentPage==='landing'){
    app.innerHTML=renderLandingPage();
  }else{
    app.innerHTML=renderTerminal();
  }

  if(appState.alertsOpen)app.innerHTML+=renderAlertsModal();
  if(appState.clvDashboardOpen)app.innerHTML+=renderCLVDashboard();

  document.querySelectorAll('.slip-stake-input').forEach(input=>{
    input.addEventListener('change',e=>{
      const id=parseInt(e.target.dataset.id);
      updateBetStake(id,e.target.value);
    });
  });
}

// ── SECTION 11: INIT ──
loadPersisted();
renderApp();
</script>
</body>
</html>
